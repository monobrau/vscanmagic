name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore VScanMagic.sln
      - name: Build
        run: dotnet build VScanMagic.sln --no-restore -c Release
      - name: Test
        run: dotnet test VScanMagic.sln --no-build -c Release --verbosity normal
